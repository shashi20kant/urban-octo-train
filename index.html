<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Exam System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 0; text-align: center; overflow: hidden; }
        #exam-area { display: none; width: 100vw; height: 100vh; padding: 20px; }
        
        /* White-out Layer - Poori screen cover karega */
        #white-out-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: white; z-index: 999999; 
        }
        
        #timer { font-size: 24px; color: #d32f2f; font-weight: bold; }
        button { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div id="white-out-screen"></div>

    <div id="start-screen" style="margin-top: 50px;">
        <h1>Online Examination</h1>
        <button onclick="startExam()">Start Exam</button>
    </div>

    <div id="exam-area">
        <div id="timer">90:00</div>
        <img src="YOUR_QUESTION_IMAGE_URL.jpg" style="width: 100%; max-height: 70vh;">
        <button onclick="submitExam()">Submit Exam</button>
    </div>

    <script>
        let trackingData = [];
        let examActive = false;
        let timeLeft = 90 * 60;

        async function startExam() {
            document.documentElement.requestFullscreen();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('exam-area').style.display = 'block';
            examActive = true;
            
            // 1. Exam start hote hi pehla screenshot (Normal view)
            captureProof("Exam Started");
            runTimer();
        }

        async function captureProof(action) {
            // html2canvas sirf screen par dikhne wale hisse ka snapshot lega
            const canvas = await html2canvas(document.body, {
                width: window.innerWidth,
                height: window.innerHeight,
                scrollX: 0,
                scrollY: 0
            });
            const imgData = canvas.toDataURL("image/png");
            trackingData.push({ action: action, time: new Date().toLocaleTimeString(), snapshot: imgData });
        }

        setInterval(() => {
            if (!examActive) return;

            if (!document.hasFocus() || document.visibilityState === "hidden") {
                document.getElementById('white-out-screen').style.display = 'block';
            } else {
                document.getElementById('white-out-screen').style.display = 'none';
            }
        }, 200);

        function runTimer() {
            let timerEl = document.getElementById('timer');
            setInterval(() => {
                if (!examActive) return;
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeLeft <= 0) submitExam();
            }, 1000);
        }

        function submitExam() {
            if(!examActive) return;
            examActive = false;
            // JSON report download
            let report = JSON.stringify(trackingData, null, 2);
            let blob = new Blob([report], { type: "application/json" });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Exam_Evidence_Report_" + Date.now() + ".json";
            a.click();
            alert("Exam Submitted & Evidence Collected!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Exam System</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        #exam-area { display: none; width: 100%; max-width: 600px; margin: auto; }
        
        /* White-out Layer */
        #white-out-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 999999; 
        }
        
        #timer { font-size: 28px; color: #d32f2f; font-weight: bold; margin-bottom: 20px; }
        button { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div id="white-out-screen"></div>

    <div id="start-screen">
        <h1>Online Examination</h1>
        <button onclick="startExam()">Start Exam</button>
    </div>

    <div id="exam-area">
        <div id="timer">90:00</div>
        <img src="YOUR_QUESTION_IMAGE_URL.jpg" style="width: 100%;">
        <button onclick="submitExam()">Submit Exam</button>
    </div>

    <script>
        let trackingData = [];
        let examActive = false, isAway = false, awayStartTime = null;
        let timeLeft = 90 * 60;

        function startExam() {
            document.documentElement.requestFullscreen();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('exam-area').style.display = 'block';
            examActive = true;
            runTimer();
        }

        // Monitoring Logic (Har 200ms mein check)
        setInterval(() => {
            if (!examActive) return;

            // Isme 'hidden' aur 'focus' dono cover hain
            if (!document.hasFocus() || document.visibilityState === "hidden") {
                document.getElementById('white-out-screen').style.display = 'block';
                if (!isAway) {
                    isAway = true;
                    awayStartTime = new Date();
                    logEvent("Cheating Attempt: Window/Overlay Detected");
                }
            } else {
                document.getElementById('white-out-screen').style.display = 'none';
                if (isAway) {
                    let duration = Math.round((new Date() - awayStartTime) / 1000);
                    logEvent("Returned to exam. Away for: " + duration + "s");
                    isAway = false;
                }
            }
        }, 200);

        function logEvent(action) {
            trackingData.push({ action: action, time: new Date().toLocaleTimeString() });
        }

        function runTimer() {
            let timerEl = document.getElementById('timer');
            let timerInt = setInterval(() => {
                if (!examActive) return clearInterval(timerInt);
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeLeft <= 0) submitExam();
            }, 1000);
        }

        function submitExam() {
            if(!examActive) return;
            examActive = false;
            let report = "Exam Tracking Report:\n" + JSON.stringify(trackingData, null, 2);
            let blob = new Blob([report], { type: "text/plain" });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Report_" + Date.now() + ".txt";
            a.click();
            alert("Exam Submitted!");
        }
    </script>
</body>
</html>
</body>
</html>

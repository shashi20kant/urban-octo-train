<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        
        #start-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        #exam-area { display: none; width: 100%; max-width: 600px; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; }
        
        #header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        
        #timer { font-size: 18px; color: #d32f2f; font-weight: bold; background: #ffebee; padding: 5px 10px; border-radius: 5px; }
        
        img { width: 100%; border-radius: 8px; border: 1px solid #ddd; }
        
        button { background: #2563eb; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { background: #1d4ed8; }
        
        .submit-btn { background: #059669; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>Online Examination</h2>
        <p>Instructions: Window minimize ya tab switch karna mana hai.</p>
        <button onclick="startExam()">Start Exam</button>
    </div>

    <div id="exam-area">
        <div id="header">
            <strong>Exam Paper</strong>
            <div id="timer">01:30:00</div>
        </div>
        
        <img src="YOUR_QUESTION_IMAGE_URL.jpg" alt="Question">
        
        <button class="submit-btn" onclick="submitExam()">Submit Exam</button>
    </div>

    <script>
        let trackingData = [];
        let startTime, endTime;
        let timeLeft = 90 * 60;
        let examActive = false;
        let isAway = false;
        let awayStartTime = null;

        function startExam() {
            document.documentElement.requestFullscreen();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('exam-area').style.display = 'block';
            
            startTime = new Date(); // Start time record
            examActive = true;

            setInterval(() => {
                if (!examActive) return;
                
                // Timer Logic
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeLeft <= 0) submitExam();

                // Focus Tracking Logic
                if (!document.hasFocus()) {
                    if (!isAway) {
                        isAway = true;
                        awayStartTime = new Date();
                        logEvent("Focus Lost (Activity Started)");
                    }
                } else if (isAway) {
                    let duration = Math.round((new Date() - awayStartTime) / 1000);
                    logEvent(`Returned after ${duration} seconds`);
                    isAway = false;
                }
            }, 1000);
        }

        function logEvent(action) {
            trackingData.push({ action: action, time: new Date().toLocaleTimeString() });
        }

        function submitExam() {
            if(!examActive) return;
            examActive = false;
            endTime = new Date();

            // Calculate Total Duration
            let totalDuration = Math.round((endTime - startTime) / 60000);
            
            let report = `--- Exam Tracking Report ---\n`;
            report += `Start Time: ${startTime.toLocaleTimeString()}\n`;
            report += `End Time: ${endTime.toLocaleTimeString()}\n`;
            report += `Total Exam Duration: ${totalDuration} minutes\n\n`;
            report += `Activity Logs:\n` + JSON.stringify(trackingData, null, 2);
            
            let blob = new Blob([report], { type: "text/plain" });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Exam_Report_" + new Date().getTime() + ".txt";
            a.click();
            
            document.body.innerHTML = "<h1>Exam Submitted!</h1><p>Report download ho gayi hai.</p>";
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Questions</title>
  <style>
    :root{ --bg:#020617;--line:#334155;--text:#e2e8f0;--muted:#94a3b8;--acc:#22d3ee;--acc2:#a78bfa; }
    *{ box-sizing:border-box; }
    html,body{ margin:0; height:100%; overflow:hidden; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); }

    /* Full height shell — NO scroll anywhere */
    .shell{ height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    /* Question area — takes remaining space, no scroll */
    .q-area{
      flex:1 1 auto; min-height:0; overflow:hidden;
      padding:8px 10px 4px;
    }
    .meta{ color:var(--muted); font-size:11px; margin-bottom:4px; }
    .q-text{ font-size:clamp(14px,3.8vw,19px); margin:0 0 6px; line-height:1.4; }
    .opts{ overflow:hidden; }
    .opt{
      border:1px solid var(--line); border-radius:7px; padding:7px 9px;
      margin-bottom:6px; display:flex; gap:7px; align-items:center; cursor:pointer;
      font-size:clamp(12px,3.2vw,14px);
    }
    .opt:hover{ border-color:var(--acc); }
    .opt input[type=radio]{ accent-color:var(--acc); flex-shrink:0; }
    .logic-body{
      border:1px solid #33507e; border-radius:8px; padding:10px;
      background:#0b162b; color:#dbeafe; line-height:1.55;
      font-size:clamp(13px,3.4vw,15px);
    }

    /* Controls — fixed at bottom, never scrolls */
    .ctrl{
      flex-shrink:0; background:#020617;
      border-top:1px solid #1e2d45; padding:5px 8px 4px;
    }
    .pal-label{ font-size:10px; color:var(--muted); margin-bottom:2px; }
    .palette{ display:flex; gap:4px; flex-wrap:wrap; margin-bottom:4px; }
    .pill{
      width:28px; height:28px; border-radius:50%; border:1px solid var(--line);
      background:#1e293b; color:#cbd5e1; cursor:pointer; font-weight:700;
      font-size:11px; display:flex; align-items:center; justify-content:center; padding:0;
    }
    .pill.am{ outline:2px solid var(--acc); }
    .pill.al{ outline:2px solid var(--acc2); }
    .pill.answered{ background:#14532d; border-color:#22c55e; }
    .nav-row{ display:flex; gap:5px; align-items:center; justify-content:center; margin-bottom:3px; }
    .nlabel{ font-size:10px; color:var(--muted); min-width:40px; text-align:center; }
    button{ border:0; border-radius:6px; cursor:pointer; padding:6px 11px; font-weight:700; font-size:12px; background:#334155; color:#f1f5f9; }
    button:disabled{ opacity:0.35; cursor:not-allowed; }
    .sbtn{ background:#16a34a; color:#f0fdf4; }
    .hint{ color:#86efac; font-size:10px; min-height:12px; text-align:center; }
    .divider{ border:none; border-top:1px solid #1e2d45; margin:3px 0; }
  </style>
</head>
<body>
<div class="shell">
  <!-- Question display -->
  <div class="q-area">
    <div class="meta" id="metaText"></div>
    <div class="q-text" id="qText"></div>
    <div class="opts" id="optsBox"></div>
  </div>

  <!-- Fixed controls -->
  <div class="ctrl">
    <div class="pal-label">MCQ Questions</div>
    <div class="palette" id="mcqPal"></div>
    <div class="nav-row">
      <button id="mp">&#8592; Back</button>
      <span class="nlabel" id="mLabel">—</span>
      <button id="mn">Next &#8594;</button>
    </div>
    <hr class="divider">
    <div class="pal-label">Objective / Reading</div>
    <div class="palette" id="logPal"></div>
    <div class="nav-row">
      <button id="lp">&#8592; Back</button>
      <span class="nlabel" id="lLabel">—</span>
      <button id="ln">Next &#8594;</button>
      <button class="sbtn" id="subBtn">Submit</button>
    </div>
    <div class="hint" id="hint"></div>
  </div>
</div>

<script>
  const SESSION_KEY      = "exam_active_session";
  const ANSWER_KEY_PFX   = "exam_answers_";

  // ── QUESTIONS ──
  // kind: "mcq" = MCQ only | "logic" = reading/objective only
  const items = [
    {
      id:"s1", kind:"logic",
      headline:"Objective 1 — Reading",
      body:"Yeh sirf padaav hai. Ye objective MCQ me count nahi hoga."
    },
    {
      id:"h2", kind:"mcq",
      mcqTitle:"Web page par external JS ka sahi tarika?",
      options:{ A:"<script src='app.js'><\/script>", B:"<javascript src='app.js'>", C:"<js href='app.js'>", D:"<link rel='script' href='app.js'>" },
      correctOption:"A"
    },
    {
      id:"m3", kind:"mcq",
      mcqTitle:"CSS me text rang set karne waala property?",
      options:{ A:"font-style", B:"text-color", C:"color", D:"font-color" },
      correctOption:"C"
    },
    {
      id:"h4", kind:"mcq",
      mcqTitle:"HTML ka poora naam?",
      options:{ A:"Hyper Text Markup Language", B:"High Tool Markup Language", C:"Hyper Tab Mark Language", D:"Home Text Model Language" },
      correctOption:"A"
    }
  ];

  const mcqItems   = items.filter(it=>it.kind==="mcq");
  const logicItems = items.filter(it=>it.kind==="logic");
  const mcqQuestions = mcqItems.map(it=>({ id:it.id, question:it.mcqTitle, options:it.options, correctOption:it.correctOption }));

  const params    = new URLSearchParams(window.location.search);
  let sessionId   = params.get("session") || localStorage.getItem(SESSION_KEY) || "";
  if(!sessionId) sessionId = `fallback_${Date.now()}`;
  localStorage.setItem(SESSION_KEY, sessionId);
  const storageKey = ANSWER_KEY_PFX + sessionId;

  let mcqIdx=0, logIdx=0, activeSection="mcq";
  let state = { sessionId, mcqQuestions, answers:{} };

  function loadState(){
    const raw=localStorage.getItem(storageKey); if(!raw)return;
    try{ const p=JSON.parse(raw); if(p&&p.answers) state.answers=p.answers||{}; }catch{}
  }
  function persist(){
    localStorage.setItem(storageKey, JSON.stringify({ sessionId:state.sessionId, questions:state.mcqQuestions, answers:state.answers, updatedAt:new Date().toISOString() }));
    document.getElementById("hint").textContent=`Saved ${new Date().toLocaleTimeString()}`;
  }
  function esc(t){ return String(t).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }

  function renderQ(){
    const meta=document.getElementById("metaText");
    const qEl =document.getElementById("qText");
    const oEl =document.getElementById("optsBox");
    if(activeSection==="mcq"){
      const it=mcqItems[mcqIdx]; if(!it)return;
      meta.textContent=`MCQ ${mcqIdx+1} of ${mcqItems.length}`;
      qEl.textContent=it.mcqTitle;
      const sel=state.answers[it.id]||"";
      oEl.innerHTML=Object.entries(it.options).map(([k,v])=>
        `<label class="opt"><input type="radio" name="ans" value="${k}" ${k===sel?"checked":""}><strong>${esc(k)}.</strong><span>${esc(v)}</span></label>`
      ).join("");
    } else {
      const it=logicItems[logIdx]; if(!it)return;
      meta.textContent=`Objective ${logIdx+1} of ${logicItems.length}`;
      qEl.textContent=it.headline;
      oEl.innerHTML=`<div class="logic-body">${esc(it.body)}</div>`;
    }
  }

  function renderMcqPal(){
    const pal=document.getElementById("mcqPal"); pal.innerHTML="";
    mcqItems.forEach((q,i)=>{
      const b=document.createElement("button"); b.type="button"; b.className="pill";
      if(state.answers[q.id]) b.classList.add("answered");
      if(activeSection==="mcq"&&i===mcqIdx) b.classList.add("am");
      b.textContent=String(i+1);
      b.addEventListener("click",()=>{ mcqIdx=i; activeSection="mcq"; render(); });
      pal.appendChild(b);
    });
    document.getElementById("mLabel").textContent=mcqItems.length?`${mcqIdx+1}/${mcqItems.length}`:"—";
    document.getElementById("mp").disabled=mcqIdx===0;
    document.getElementById("mn").disabled=mcqIdx===mcqItems.length-1;
  }

  function renderLogPal(){
    const pal=document.getElementById("logPal"); pal.innerHTML="";
    logicItems.forEach((q,i)=>{
      const b=document.createElement("button"); b.type="button"; b.className="pill";
      if(activeSection==="logic"&&i===logIdx) b.classList.add("al");
      b.textContent=String(i+1);
      b.addEventListener("click",()=>{ logIdx=i; activeSection="logic"; render(); });
      pal.appendChild(b);
    });
    const hasLog=logicItems.length>0;
    document.getElementById("lLabel").textContent=hasLog?`${logIdx+1}/${logicItems.length}`:"—";
    document.getElementById("lp").disabled=!hasLog||logIdx===0;
    document.getElementById("ln").disabled=!hasLog||logIdx===logicItems.length-1;
  }

  function render(){ renderQ(); renderMcqPal(); renderLogPal(); }

  document.getElementById("optsBox").addEventListener("change",e=>{
    if(!e.target||e.target.name!=="ans"||activeSection!=="mcq")return;
    const it=mcqItems[mcqIdx]; if(!it)return;
    state.answers[it.id]=e.target.value; persist(); renderMcqPal();
  });

  document.getElementById("mp").addEventListener("click",()=>{ if(mcqIdx>0){mcqIdx--;activeSection="mcq";render();} });
  document.getElementById("mn").addEventListener("click",()=>{ if(mcqIdx<mcqItems.length-1){mcqIdx++;activeSection="mcq";render();} });
  document.getElementById("lp").addEventListener("click",()=>{ if(logIdx>0){logIdx--;activeSection="logic";render();} });
  document.getElementById("ln").addEventListener("click",()=>{ if(logIdx<logicItems.length-1){logIdx++;activeSection="logic";render();} });

  document.getElementById("subBtn").addEventListener("click",()=>{
    if(window.parent&&window.parent!==window) window.parent.postMessage("submit_exam","*");
  });

  loadState(); persist(); render();
</script>
</body>
</html>

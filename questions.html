<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Questions</title>
  <style>
    :root {
      --bg: #020617;
      --line: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22d3ee;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    /* No page scroll inside exam iframe */
    .shell {
      min-height: 100%;
      padding: env(safe-area-inset-top, 12px) 12px max(72px, env(safe-area-inset-bottom));
      padding-bottom: 12px;
      display: flex;
      flex-direction: column;
      max-height: 100vh;
    }
    .top {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
      flex-shrink: 0;
    }
    .question {
      font-size: clamp(18px, 4.2vw, 22px);
      margin: 0 0 10px;
      line-height: 1.45;
      flex-shrink: 0;
    }
    #optionsBox {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }
    .opt {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      cursor: pointer;
    }
    .opt:hover { border-color: var(--accent); }
    .logic-block {
      border: 1px solid #33507e;
      border-radius: 10px;
      padding: 12px;
      background: #0b162b;
      color: #dbeafe;
      line-height: 1.6;
      font-size: clamp(15px, 3.6vw, 17px);
    }
    .bottom {
      flex-shrink: 0;
      margin-top: 12px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      max-width: 100%;
    }
    .bottom-spacer {
      min-height: 8vh;
      max-height: max(72px, 12vh);
    }
    .palette {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 8px;
    }
    .pill {
      width: 34px;
      height: 34px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: #1e293b;
      color: #cbd5e1;
      cursor: pointer;
      font-weight: 700;
    }
    .pill.active { outline: 2px solid #22d3ee; }
    .pill.logic { opacity: 0.85; }
    .pill.answered { background: #14532d; border-color: #22c55e; }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      margin-bottom: 6px;
    }
    button {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      padding: 10px 14px;
      font-weight: 700;
      background: #334155;
      color: #f1f5f9;
    }
    #mcqModeBtn {
      background: #0e7490;
      color: #ecfeff;
    }
    .hint { color: #86efac; font-size: 12px; min-height: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="meta" id="metaText">Objective 1 of 4</div>
      <h2 class="question" id="questionText"></h2>
      <div id="optionsBox"></div>
    </div>
    <div class="bottom-spacer"></div>
    <div class="bottom">
      <div class="palette" id="palette"></div>
      <div class="row">
        <button type="button" id="prevBtn">Back</button>
        <button type="button" id="mcqModeBtn">MCQ (options)</button>
        <button type="button" id="nextBtn">Next</button>
      </div>
      <div class="hint" id="saveHint"></div>
    </div>
  </div>

  <script>
    const SESSION_KEY = "exam_active_session";
    const ANSWER_KEY_PREFIX = "exam_answers_";

    const metaText = document.getElementById("metaText");
    const questionText = document.getElementById("questionText");
    const optionsBox = document.getElementById("optionsBox");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const mcqModeBtn = document.getElementById("mcqModeBtn");
    const palette = document.getElementById("palette");
    const saveHint = document.getElementById("saveHint");

    /*
      kind: logic = objective text only, no mcq scoring
           hybrid = objective + MCQ (options show after MCQ button)
           mcq = always show options
    */
    const items = [
      {
        id: "s1",
        kind: "logic",
        headline: "Objective 1 — Reading",
        body: "Yeh sirf padaav hai. Ye objective MCQ me count nahi hoga."
      },
      {
        id: "h2",
        kind: "hybrid",
        headline: "Objective 2 — Coding basics",
        body: "Pehle yeh padaav padhiye.",
        mcqTitle: "Web page par external JS ka sahi tarika?",
        options: {
          A: "\u003cscript src='app.js'\u003e\u003c/script\u003e",
          B: "\u003cjavascript src='app.js'\u003e",
          C: "\u003cjs href='app.js'\u003e",
          D: "\u003clink rel='script' href='app.js'\u003e"
        },
        correctOption: "A"
      },
      {
        id: "m3",
        kind: "mcq",
        mcqTitle: "CSS me text rang set karne waala property?",
        options: { A: "font-style", B: "text-color", C: "color", D: "font-color" },
        correctOption: "C"
      },
      {
        id: "h4",
        kind: "hybrid",
        headline: "Objective 4 — Last step",
        body: "Chota padaav.",
        mcqTitle: "HTML ka poora naam?",
        options: {
          A: "Hyper Text Markup Language",
          B: "High Tool Markup Language",
          C: "Hyper Tab Mark Language",
          D: "Home Text Model Language"
        },
        correctOption: "A"
      }
    ];

    const mcqQuestions = items
      .filter((it) => it.kind === "hybrid" || it.kind === "mcq")
      .map((it) => ({
        id: it.id,
        question: it.mcqTitle,
        options: it.options,
        correctOption: it.correctOption
      }));

    const params = new URLSearchParams(window.location.search);
    let sessionId = params.get("session") || localStorage.getItem(SESSION_KEY) || "";
    if (!sessionId) sessionId = `fallback_${Date.now()}`;
    localStorage.setItem(SESSION_KEY, sessionId);

    const storageKey = ANSWER_KEY_PREFIX + sessionId;
    let currentIndex = 0;
    let state = {
      sessionId,
      items,
      mcqQuestions,
      revealed: {},
      answers: {},
      updatedAt: new Date().toISOString()
    };

    function loadState() {
      const raw = localStorage.getItem(storageKey);
      if (!raw) return;
      try {
        const p = JSON.parse(raw);
        if (p && p.mcqQuestions && p.answers) {
          state.answers = p.answers || {};
          state.revealed = p.revealed || {};
        }
      } catch (_) {}
    }

    function persist() {
      const payload = {
        sessionId: state.sessionId,
        questions: state.mcqQuestions,
        answers: state.answers,
        revealed: state.revealed,
        updatedAt: new Date().toISOString()
      };
      localStorage.setItem(storageKey, JSON.stringify(payload));
      saveHint.textContent = `Saved ${new Date().toLocaleTimeString()}`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function optionHtml(key, text, checked) {
      return `
        <label class="opt">
          <input type="radio" name="answer" value="${key}" ${checked ? "checked" : ""} />
          <strong>${key}.</strong> <span>${escapeHtml(text)}</span>
        </label>
      `;
    }

    function renderPalette() {
      palette.innerHTML = "";
      items.forEach((q, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pill";
        if (q.kind === "logic") btn.classList.add("logic");
        const mcqId = q.kind === "hybrid" || q.kind === "mcq" ? q.id : null;
        if (mcqId && state.answers[mcqId]) btn.classList.add("answered");
        if (i === currentIndex) btn.classList.add("active");
        btn.textContent = String(i + 1);
        btn.addEventListener("click", () => {
          currentIndex = i;
          render();
        });
        palette.appendChild(btn);
      });
    }

    function currentItemShowsMcq(it) {
      if (it.kind === "logic") return false;
      if (it.kind === "mcq") return true;
      return !!state.revealed[it.id];
    }

    function render() {
      const it = items[currentIndex];
      metaText.textContent = `${it.kind === "logic" ? "Objective" : "Step"} ${currentIndex + 1} of ${items.length}`;

      mcqModeBtn.style.display =
        it.kind === "hybrid" && !state.revealed[it.id]
          ? "inline-block"
          : it.kind === "hybrid" && state.revealed[it.id]
            ? "none"
            : it.kind === "mcq"
              ? "none"
              : "none";

      if (it.kind === "logic") {
        questionText.textContent = it.headline;
        optionsBox.innerHTML = `<div class="logic-block">${escapeHtml(it.body)}</div>`;
      } else if (it.kind === "hybrid") {
        const showMcq = currentItemShowsMcq(it);
        questionText.textContent = showMcq ? it.mcqTitle : it.headline;
        if (!showMcq) {
          optionsBox.innerHTML = `<div class="logic-block">${escapeHtml(it.body)}</div>`;
        } else {
          const sel = state.answers[it.id] || "";
          optionsBox.innerHTML = Object.entries(it.options)
            .map(([k, v]) => optionHtml(k, v, k === sel))
            .join("");
        }
      } else {
        questionText.textContent = it.mcqTitle;
        const sel = state.answers[it.id] || "";
        optionsBox.innerHTML = Object.entries(it.options)
          .map(([k, v]) => optionHtml(k, v, k === sel))
          .join("");
      }

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === items.length - 1;
      renderPalette();
    }

    optionsBox.addEventListener("change", (e) => {
      const t = e.target;
      if (!t || t.name !== "answer") return;
      const it = items[currentIndex];
      if (it.kind !== "hybrid" && it.kind !== "mcq") return;
      if (it.kind === "hybrid" && !state.revealed[it.id]) return;
      state.answers[it.id] = t.value;
      persist();
      renderPalette();
    });

    mcqModeBtn.addEventListener("click", () => {
      const it = items[currentIndex];
      if (it.kind !== "hybrid") return;
      state.revealed[it.id] = true;
      persist();
      render();
    });

    prevBtn.addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex -= 1;
        render();
      }
    });
    nextBtn.addEventListener("click", () => {
      if (currentIndex < items.length - 1) {
        currentIndex += 1;
        render();
      }
    });

    loadState();
    persist();
    render();
  </script>
</body>
</html>
